name: Auto Patch PPT Images with White Background

on:
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run image patching script
      run: |
        python Github_Actions/auto_patch_images.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated patch: Add white background to PPT images"
        file_pattern: '**.md'